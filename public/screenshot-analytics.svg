<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#020617"/>
  <!-- Growth Tracking -->
  <rect x="50" y="50" width="700" height="400" rx="32" fill="#0F172A" stroke="#1E293B"/>
  
  <text x="100" y="100" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="white">Growth Tracking</text>
  <text x="100" y="130" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#64748B">Visualize your academic progress and syllabus coverage.</text>
  
  <!-- Progress Bars -->
  <text x="100" y="180" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#94A3B8">Syllabus Grounding</text>
  <rect x="100" y="200" width="600" height="12" rx="6" fill="#020617"/>
  <rect x="100" y="200" width="450" height="12" rx="6" fill="#4F46E5"/>
  
  <text x="100" y="250" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#94A3B8">Academic Difficulty</text>
  <rect x="100" y="270" width="600" height="12" rx="6" fill="#020617"/>
  <rect x="100" y="270" width="300" height="12" rx="6" fill="#10B981"/>
  
  <!-- Stats -->
  <rect x="100" y="320" width="180" height="80" rx="16" fill="#020617" stroke="#1E293B"/>
  <text x="120" y="350" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#64748B">Materials Tracked</text>
  <text x="120" y="380" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="white">12</text>
  
  <rect x="310" y="320" width="180" height="80" rx="16" fill="#020617" stroke="#1E293B"/>
  <text x="330" y="350" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#64748B">Concepts Mastered</text>
  <text x="330" y="380" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="white">84</text>
</svg>
