<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#020617"/>
  <!-- Immersive Tutoring View -->
  <rect x="50" y="50" width="700" height="400" rx="32" fill="#0F172A" stroke="#1E293B"/>
  
  <!-- Avatar Area -->
  <rect x="100" y="100" width="200" height="200" rx="100" fill="#4F46E5" fill-opacity="0.2"/>
  <circle cx="200" cy="200" r="60" fill="#4F46E5"/>
  <text x="200" y="330" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="white" text-anchor="middle">Khula AI Avatar</text>
  
  <!-- Chat Area -->
  <rect x="350" y="100" width="350" height="250" rx="16" fill="#020617" fill-opacity="0.5" stroke="#1E293B"/>
  <text x="370" y="130" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#94A3B8">Khula AI:</text>
  <text x="370" y="150" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="white">Let's work through this concept together.</text>
  
  <rect x="370" y="300" width="310" height="30" rx="8" fill="#1E293B"/>
  <text x="380" y="320" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#64748B">Type your question here...</text>
</svg>
